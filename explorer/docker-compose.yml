services:
  # -------------------------------------------
  # AUTHELIA (The SSO Gatekeeper)
  # -------------------------------------------
  authelia:
    image: authelia/authelia:latest
    container_name: authelia
    restart: unless-stopped
    ports:
      - "9091:9091"
    volumes:
      - /docker/authelia/config:/config
    environment:
      - TZ=${TZ}

  # -------------------------------------------
  # NEXTEXPLORER (Web Bridge & Guest Access)
  # -------------------------------------------
  nextexplorer:
    image: nxzai/explorer:latest
    container_name: nextexplorer
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - /docker/nextexplorer/config:/config
      - /docker/nextexplorer/cache:/cache
      - /data/shared_media:/mnt/Shared_Media
    environment:
      NODE_ENV: production
      PORT: "3000"
      # If using a domain, this should be https://explorer.yourdomain.com
      PUBLIC_URL: "http://${SERVER_IP_OR_DOMAIN}:3000"
      PUID: ${PUID}
      PGID: ${PGID}

      # Authelia SSO Configuration
      AUTH_MODE: "oidc"
      OIDC_ENABLED: "true"
      # OIDC Issuer MUST match the URL you use to access Authelia
      OIDC_ISSUER: "http://${SERVER_IP_OR_DOMAIN}:9091"
      OIDC_CLIENT_ID: ${OIDC_CLIENT_ID}
      OIDC_CLIENT_SECRET: ${OIDC_CLIENT_SECRET}
      OIDC_AUTO_CREATE_USERS: "true"
      OIDC_ADMIN_GROUPS: "admins"
    depends_on:
      - authelia

  # -------------------------------------------
  # TDARR SERVER & NODE (H.265 Automation)
  # -------------------------------------------
  tdarr:
    image: ghcr.io/haveagitgat/tdarr:latest
    container_name: tdarr
    restart: unless-stopped
    ports:
      - "8265:8265"
      - "8266:8266"
    environment:
      - TZ=${TZ}
      - PUID=${PUID}
      - PGID=${PGID}
      - serverIP=0.0.0.0
      - serverPort=8266
      - webUIPort=8265
    volumes:
      - /docker/tdarr/server:/app/server
      - /docker/tdarr/configs:/app/configs
      - /data/shared_media:/media/shared_media

  tdarr-node:
    image: ghcr.io/haveagitgat/tdarr_node:latest
    container_name: tdarr-node
    restart: unless-stopped
    environment:
      - TZ=${TZ}
      - PUID=${PUID}
      - PGID=${PGID}
      - nodeName=InternalServerNode
      - serverIP=tdarr
      - serverPort=8266
    volumes:
      - /docker/tdarr/configs:/app/configs
      - /data/shared_media:/media/shared_media
    devices:
      - /dev/dri:/dev/dri

  # -------------------------------------------
  # IMMICH (The AI Gallery)
  # -------------------------------------------
  immich-server:
    image: ghcr.io/immich-app/immich-server:release
    container_name: immich_server
    restart: always
    ports:
      - "2283:2283"
    environment:
      - DB_HOSTNAME=immich-db
      - DB_USERNAME=${IMMICH_DB_USERNAME}
      - DB_PASSWORD=${IMMICH_DB_PASSWORD}
      - DB_DATABASE_NAME=${IMMICH_DB_NAME}
      - REDIS_HOSTNAME=immich-redis
      - TZ=${TZ}
    volumes:
      - /data/immich_internal:/usr/src/app/upload
      - /data/shared_media:/mnt/Shared_Media:ro
    depends_on:
      - immich-redis
      - immich-db

  immich-machine-learning:
    image: ghcr.io/immich-app/immich-machine-learning:release
    container_name: immich_machine_learning
    restart: always
    environment:
      - TZ=${TZ}
    volumes:
      - /docker/immich/model-cache:/cache

  immich-db:
    image: docker.io/tensorchord/pgvecto-rs:pg14-v0.2.0@sha256:90724186f0a3517cf6914295b5ab410db9ce23190a2d9d0b9dd6463e3fa298f0
    container_name: immich_postgres
    restart: always
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - /docker/immich/postgres:/var/lib/postgresql/data

  immich-redis:
    image: docker.io/redis:6.2-alpine@sha256:e3b17ba9479deec4b7d1eeec1548a253acc5374d68d3b27937fc446edc06d19
    container_name: immich_redis
    restart: always
