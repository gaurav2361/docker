services:
  # ██╗     ██╗     ██████╗  █████╗ ██████╗
  # ██║     ██║     ██╔══██╗██╔══██╗██╔══██╗
  # ██║     ██║     ██║  ██║███████║██████╔╝
  # ██║     ██║     ██║  ██║██╔══██║██╔═══╝
  # ███████╗███████╗██████╔╝██║  ██║██║
  # ╚══════╝╚══════╝╚═════╝ ╚═╝  ╚═╝╚═╝
  # (The Central Identity Brain)
  lldap:
    image: lldap/lldap:latest
    container_name: lldap
    restart: unless-stopped
    ports:
      - "17170:17170" # Web UI
      - "3890:3890" # LDAP Port
    volumes:
      - /docker/lldap/data:/data
    environment:
      - TZ=${TZ}
      - LLDAP_LDAP_BASE_DN=${LDAP_BASE_DN}
      - LLDAP_LDAP_USER_PASS=${LDAP_ADMIN_PASSWORD}
      - LLDAP_DATABASE_URL=sqlite:///data/users.db
      - LLDAP_KEY_SEED=${LLDAP_SEED}
      # THE MAGIC SWITCH: Automatically generates NTLM hashes for Samba
      - LLDAP_LDAP_OPTIONS_ENABLE_SAMBA=true
    networks:
      - media_net

  #  █████╗ ██╗   ██╗████████╗██╗  ██╗███████╗██╗     ██╗ █████╗
  # ██╔══██╗██║   ██║╚══██╔══╝██║  ██║██╔════╝██║     ██║██╔══██╗
  # ███████║██║   ██║   ██║   ███████║█████╗  ██║     ██║███████║
  # ██╔══██║██║   ██║   ██║   ██╔══██║██╔══╝  ██║     ██║██╔══██║
  # ██║  ██║╚██████╔╝   ██║   ██║  ██║███████╗███████╗██║██║  ██║
  # ╚═╝  ╚═╝ ╚═════╝    ╚═╝   ╚═╝  ╚═╝╚══════╝╚══════╝╚═╝╚═╝  ╚═╝
  # (The SSO Gatekeeper)
  authelia:
    image: authelia/authelia:latest
    container_name: authelia
    restart: unless-stopped
    ports:
      - "9091:9091"
    volumes:
      - /docker/authelia/config:/config
    environment:
      - TZ=${TZ}
    depends_on:
      - lldap
    networks:
      - media_net

  # ███╗   ██╗███████╗██╗  ██╗████████╗███████╗██╗  ██╗██████╗ ██╗      ██████╗ ██████╗ ███████╗██████╗
  # ████╗  ██║██╔════╝╚██╗██╔╝╚══██╔══╝██╔════╝╚██╗██╔╝██╔══██╗██║     ██╔═══██╗██╔══██╗██╔════╝██╔══██╗
  # ██╔██╗ ██║█████╗   ╚███╔╝    ██║   █████╗   ╚███╔╝ ██████╔╝██║     ██║   ██║██████╔╝█████╗  ██████╔╝
  # ██║╚██╗██║██╔══╝   ██╔██╗    ██║   ██╔══╝   ██╔██╗ ██╔═══╝ ██║     ██║   ██║██╔══██╗██╔══╝  ██╔══██╗
  # ██║ ╚████║███████╗██╔╝ ██╗   ██║   ███████╗██╔╝ ██╗██║     ███████╗╚██████╔╝██║  ██║███████╗██║  ██║
  # ╚═╝  ╚═══╝╚══════╝╚═╝  ╚═╝   ╚═╝   ╚══════╝╚═╝  ╚═╝╚═╝     ╚══════╝ ╚═════╝ ╚═╝  ╚═╝╚══════╝╚═╝  ╚═╝
  # (Data Web Bridge)
  nextexplorer:
    image: nxzai/explorer:latest
    container_name: nextexplorer
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - /docker/nextexplorer/config:/config
      - /docker/nextexplorer/cache:/cache
      - /data:/mnt/Data
    environment:
      NODE_ENV: production
      PORT: "3000"
      PUBLIC_URL: "${PRIMARY_BASE_URL}:3000"
      PUID: ${PUID}
      PGID: ${PGID}
      AUTH_MODE: "oidc"
      OIDC_ENABLED: "true"
      OIDC_ISSUER: "${PRIMARY_BASE_URL}:9091"
      OIDC_CLIENT_ID: ${OIDC_CLIENT_ID}
      OIDC_CLIENT_SECRET: ${OIDC_CLIENT_SECRET}
      # Industry-standard space-separated scopes
      OIDC_SCOPES: "openid profile email groups"
      OIDC_AUTO_CREATE_USERS: "true"
      OIDC_ADMIN_GROUPS: "admins"
      # ONLYOFFICE Integration
      ONLYOFFICE_URL: "${PRIMARY_BASE_URL}:8080"
      ONLYOFFICE_SECRET: "${ONLYOFFICE_SECRET}"
      # Collabora Integration
      COLLABORA_URL: "${PRIMARY_BASE_URL}:9980"
      COLLABORA_SECRET: "${COLLABORA_SECRET}"
    depends_on:
      - authelia
      - onlyoffice
      - collabora
    networks:
      - media_net

  # ████████╗██████╗  █████╗ ██████╗ ██████╗
  # ╚══██╔══╝██╔══██╗██╔══██╗██╔══██╗██╔══██╗
  #    ██║   ██║  ██║███████║██████╔╝██████╔╝
  #    ██║   ██║  ██║██╔══██║██╔══██╗██╔══██╗
  #    ██║   ██████╔╝██║  ██║██║  ██║██║  ██║
  #    ╚═╝   ╚═════╝ ╚═╝  ╚═╝╚═╝  ╚═╝╚═╝  ╚═╝
  # (Asset Optimization)
  tdarr:
    image: ghcr.io/haveagitgat/tdarr:latest
    container_name: tdarr
    restart: unless-stopped
    ports:
      - "8265:8265"
      - "8266:8266"
    environment:
      - TZ=${TZ}
      - PUID=${PUID}
      - PGID=${PGID}
      - serverIP=0.0.0.0
      - serverPort=8266
      - webUIPort=8265
    volumes:
      - /docker/tdarr/server:/app/server
      - /docker/tdarr/configs:/app/configs
      - /data:/media/data
    networks:
      - media_net

  tdarr-node:
    image: ghcr.io/haveagitgat/tdarr_node:latest
    container_name: tdarr-node
    restart: unless-stopped
    environment:
      - TZ=${TZ}
      - PUID=${PUID}
      - PGID=${PGID}
      - nodeName=MarketingServerNode
      - serverIP=tdarr
      - serverPort=8266
    volumes:
      - /docker/tdarr/configs:/app/configs
      - /data:/media/data
    devices:
      - /dev/dri:/dev/dri
    networks:
      - media_net

  # ██╗███╗   ███╗███╗   ███╗██╗ ██████╗██╗  ██╗
  # ██║████╗ ████║████╗ ████║██║██╔════╝██║  ██║
  # ██║██╔████╔██║██╔████╔██║██║██║     ███████║
  # ██║██║╚██╔╝██║██║╚██╔╝██║██║██║     ██╔══██║
  # ██║██║ ╚═╝ ██║██║ ╚═╝ ██║██║╚██████╗██║  ██║
  # ╚═╝╚═╝     ╚═╝╚═╝     ╚═╝╚═╝ ╚═════╝╚═╝  ╚═╝
  # (Gallery - Pure Viewer Mode)
  immich-server:
    image: ghcr.io/immich-app/immich-server:release
    container_name: immich_server
    restart: always
    ports:
      - "2283:2283"
    environment:
      - DB_HOSTNAME=immich-db
      - DB_USERNAME=${IMMICH_DB_USERNAME}
      - DB_PASSWORD=${IMMICH_DB_PASSWORD}
      - DB_DATABASE_NAME=${IMMICH_DB_NAME}
      - REDIS_HOSTNAME=immich-redis
      - TZ=${TZ}
    volumes:
      - /docker/immich/upload:/usr/src/app/upload
      - /data:/mnt/Data:ro # Read-Only Bridge
    depends_on:
      - immich-redis
      - immich-db
    networks:
      - media_net

  immich-db:
    image: docker.io/tensorchord/pgvecto-rs:pg14-v0.2.0
    container_name: immich_postgres
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - /docker/immich/postgres:/var/lib/postgresql/data
    networks:
      - media_net

  immich-redis:
    image: docker.io/redis:6.2-alpine
    container_name: immich_redis
    networks:
      - media_net

  # ██████╗ ███╗   ██╗██╗     ██╗   ██╗ ██████╗ ███████╗███████╗██╗ ██████╗███████╗
  #██╔═══██╗████╗  ██║██║     ╚██╗ ██╔╝██╔═══██╗██╔════╝██╔════╝██║██╔════╝██╔════╝
  #██║   ██║██╔██╗ ██║██║      ╚████╔╝ ██║   ██║█████╗  █████╗  ██║██║     █████╗
  #██║   ██║██║╚██╗██║██║       ╚██╔╝  ██║   ██║██╔══╝  ██╔══╝  ██║██║     ██╔══╝
  #╚██████╔╝██║ ╚████║███████╗   ██║   ╚██████╔╝██║     ██║     ██║╚██████╗███████╗
  # ╚═════╝ ╚═╝  ╚═══╝╚══════╝   ╚═╝    ╚═════╝ ╚═╝     ╚═╝     ╚═╝ ╚═════╝╚══════╝
  # (Office Integration - OnlyOffice Document Server)
  onlyoffice:
    image: onlyoffice/documentserver:latest
    container_name: onlyoffice
    restart: unless-stopped
    ports:
      - "8080:80"
    environment:
      - JWT_ENABLED=true
      - JWT_SECRET=${ONLYOFFICE_SECRET}
      - JWT_HEADER=Authorization
    volumes:
      - /docker/onlyoffice/logs:/var/log/onlyoffice
      - /docker/onlyoffice/data:/var/www/onlyoffice/Data
      - /docker/onlyoffice/lib:/var/lib/onlyoffice
      - /docker/onlyoffice/db:/var/lib/postgresql
    networks:
      - media_net

  #  ██████╗ ██████╗ ██╗     ██╗      █████╗ ██████╗  ██████╗ ██████╗  █████╗
  # ██╔════╝██╔═══██╗██║     ██║     ██╔══██╗██╔══██╗██╔═══██╗██╔══██╗██╔══██╗
  # ██║     ██║   ██║██║     ██║     ███████║██████╔╝██║   ██║██████╔╝███████║
  # ██║     ██║   ██║██║     ██║     ██╔══██║██╔══██╗██║   ██║██╔══██╗██╔══██║
  # ╚██████╗╚██████╔╝███████╗███████╗██║  ██║██████╔╝╚██████╔╝██║  ██║██║  ██║
  #  ╚═════╝ ╚═════╝ ╚══════╝╚══════╝╚═╝  ╚═╝╚═════╝  ╚═════╝ ╚═╝  ╚═╝╚═╝  ╚═╝
  # (Office Integration - Collabora CODE)
  collabora:
    image: collabora/code:latest
    container_name: collabora
    restart: unless-stopped
    cap_add: [MKNOD]
    ports:
      - "9980:9980"
    environment:
      - domain=${DOMAIN_REGEX}
      - server_name=collabora.${DOMAIN}
      - username=admin
      - password=${COLLABORA_PASSWORD}
      - extra_params=--o:ssl.enable=false --o:ssl.termination=true
    networks:
      - media_net

networks:
  media_net:
    driver: bridge
